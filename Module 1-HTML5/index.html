<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EventHub - Community Event Portal</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
<nav>
<h2>EventHub</h2>

<ul>
<li><a href="#home">Home</a></li>
<li><a href="#events">Events</a></li>
<li><a href="#gallery">Gallery</a></li>
<li><a href="register.html">Register</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
</header>

<section class="hero" id="home">

<div class="hero-content">

<h1>Discover Amazing Community Events</h1>

<p>Music • Sports • Workshops • Networking</p>

<button onclick="scrollToEvents()">Explore Events</button>

</div>

</section>

<section class="promo-video">

<h2 class="section-title">Promo Video</h2>

<div class="video-container">

<video controls>
<source src="videos/promo.mp4" type="video/mp4">
</video>

</div>

</section>

<section class="countdown">

<h2 class="section-title">Upcoming Festival Countdown</h2>

<div id="timer"></div>

</section>

<section id="events">

<h2 class="section-title">Upcoming Events</h2>

<div class="filter">

<select id="categoryFilter">

<option value="all">All Categories</option>
<option value="music">Music</option>
<option value="sports">Sports</option>
<option value="workshop">Workshop</option>

</select>

</div>

<div id="eventContainer" class="event-container"></div>

</section>

<section id="gallery">

<h2 class="section-title">Gallery</h2>

<div class="gallery">

<img src="a.jpeg">
<img src="c.jpg">
<img src="d.jpg">
<img src="e.jpg">
<img src="f.jpg">

</div>

</section>

<section class="location">

<h2 class="section-title">Find Nearby Events</h2>

<button onclick="findLocation()">Get My Location</button>

<p id="locationResult"></p>

</section>

<footer id="contact">

<h3>EventHub</h3>

<p>Email: support@eventhub.com</p>

<p>Phone: +91 9876543210</p>

</footer>

<div id="eventModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<h2 id="modalTitle"></h2>

<p id="modalDescription"></p>

</div>

</div>

<script src="main.js"></script>

</body>
</html>
